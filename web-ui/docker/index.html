<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentinel Prime</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
    
    .auth-container { display: none; min-height: 100vh; align-items: center; justify-content: center; padding: 20px; }
    .auth-container.show { display: flex; }
    .auth-box { background: #fff; border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
    .auth-box h2 { text-align: center; margin-bottom: 10px; color: #1a1a2e; }
    .auth-box p { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
    .auth-box .btn { width: 100%; margin-bottom: 15px; }
    .auth-box .toggle { text-align: center; margin-top: 20px; font-size: 14px; }
    .auth-box .toggle a { color: #2196f3; cursor: pointer; text-decoration: none; }
    .auth-box .error { background: #ffebee; color: #f44336; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; text-align: center; display: none; }
    .auth-box .error.show { display: block; }
    
    .app-container { display: none; }
    .app-container.show { display: block; }
    
    .header { background: #1a1a2e; color: #fff; padding: 20px; text-align: center; display: flex; justify-content: space-between; align-items: center; }
    .header-left h1 { font-size: 20px; }
    .header-left p { font-size: 11px; opacity: 0.7; }
    .header-right { display: flex; align-items: center; gap: 15px; }
    .user-info { font-size: 14px; }
    .logout-btn { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .logout-btn:hover { background: rgba(255,255,255,0.3); }
    
    .nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #fff; border-radius: 15px; display: flex; gap: 10px; padding: 10px 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 100; }
    .nav-btn { background: none; border: none; padding: 10px 20px; font-size: 14px; cursor: pointer; color: #666; border-radius: 10px; transition: all 0.2s; }
    .nav-btn.active { background: #2196f3; color: #fff; }
    
    .content { padding: 20px; padding-bottom: 100px; max-width: 1200px; margin: 0 auto; }
    
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .stat-card { background: #fff; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .stat-number { font-size: 32px; font-weight: bold; }
    .stat-label { font-size: 12px; color: #666; margin-top: 5px; }
    .online { color: #4caf50; }
    .alert-color { color: #ff9800; }
    .critical { color: #f44336; }
    
    .section { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .section-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
    
    .item { padding: 12px; background: #f9f9f9; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .item-info h4 { font-size: 14px; }
    .item-info p { font-size: 12px; color: #666; }
    .badge { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; }
    .badge-online { background: #e8f5e9; color: #4caf50; }
    .badge-offline { background: #ffebee; color: #f44336; }
    .badge-critical { background: #ffebee; color: #f44336; }
    .badge-high { background: #fff3e0; color: #ff9800; }
    .badge-medium { background: #fff8e1; color: #ffc107; }
    .badge-low { background: #e8f5e9; color: #4caf50; }
    
    .btn { background: #2196f3; color: #fff; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .btn:hover { background: #1976d2; }
    .btn-secondary { background: #666; }
    .btn-secondary:hover { background: #555; }
    .btn-danger { background: #f44336; }
    .btn-danger:hover { background: #d32f2f; }
    .btn-small { padding: 8px 15px; font-size: 12px; }
    
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; }
    .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    
    .modal { display: none; position: fixed; top:  0; right0; left:: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-content { background: #fff; border-radius: 12px; padding: 20px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; }
    
    .filter-bar { display: flex; gap: 10px; margin-bottom: 15px; }
    .filter-btn { flex: 1; padding: 10px; border: none; background: #fff; border-radius: 8px; cursor: pointer; font-size: 12px; }
    .filter-btn.active { background: #2196f3; color: #fff; }
    
    .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f0f0f0; }
    .setting-item:last-child { border-bottom: none; }
    .setting-info h4 { font-size: 14px; }
    .setting-info p { font-size: 12px; color: #666; }
    
    .empty { text-align: center; color: #999; padding: 40px; }
    
    .loading { text-align: center; padding: 40px; color: #666; }
    
    @media (max-width: 600px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .nav { left: 10px; right: 10px; transform: none; justify-content: space-around; }
      .nav-btn { padding: 10px 15px; font-size: 12px; }
      .header { flex-direction: column; gap: 10px; }
    }
  </style>
</head>
<body>
  <!-- Auth Container -->
  <div id="auth-container" class="auth-container show">
    <!-- Login Form -->
    <div id="login-form" class="auth-box">
      <h2>⬡ Sentinel Prime</h2>
      <p>Home Network Security</p>
      <div id="login-error" class="error"></div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="Enter username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter password">
      </div>
      <button class="btn" onclick="login()">Sign In</button>
      <button class="btn btn-secondary" onclick="showRegister()">Create Account</button>
    </div>
    
    <!-- Register Form -->
    <div id="register-form" class="auth-box" style="display:none;">
      <h2>Create Account</h2>
      <p>Join Sentinel Prime</p>
      <div id="register-error" class="error"></div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="Choose username">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="Enter email (optional)">
      </div>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-fullname" placeholder="Enter full name (optional)">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Choose password">
      </div>
      <button class="btn" onclick="register()">Create Account</button>
      <button class="btn btn-secondary" onclick="showLogin()">Back to Login</button>
    </div>
  </div>
  
  <!-- App Container -->
  <div id="app-container" class="app-container">
    <div class="header">
      <div class="header-left">
        <h1>⬡ Sentinel Prime</h1>
        <p>Home Network Security</p>
      </div>
      <div class="header-right">
        <span class="user-info" id="user-display"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>
    
    <div class="content" id="main-content">
      <!-- Content loaded dynamically -->
    </div>
    
    <nav class="nav">
      <button class="nav-btn active" onclick="showPage('dashboard')">Dashboard</button>
      <button class="nav-btn" onclick="showPage('devices')">Devices</button>
      <button class="nav-btn" onclick="showPage('alerts')">Alerts</button>
      <button class="nav-btn" onclick="showPage('settings')">Settings</button>
    </nav>
  </div>

  <div id="device-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">Add Device</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <form id="device-form">
        <input type="hidden" id="device-id">
        <div class="form-group">
          <label>Name *</label>
          <input type="text" id="device-name" required>
        </div>
        <div class="form-group">
          <label>IP Address *</label>
          <input type="text" id="device-ip" required>
        </div>
        <div class="form-group">
          <label>MAC Address</label>
          <input type="text" id="device-mac">
        </div>
        <div class="form-group">
          <label>Type</label>
          <select id="device-type">
            <option value="unknown">Unknown</option>
            <option value="router">Router</option>
            <option value="computer">Computer</option>
            <option value="laptop">Laptop</option>
            <option value="phone">Phone</option>
            <option value="tablet">Tablet</option>
            <option value="iot">IoT</option>
            <option value="server">Server</option>
            <option value="tv">TV</option>
            <option value="printer">Printer</option>
            <option value="gaming">Gaming</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="device-status">
            <option value="unknown">Unknown</option>
            <option value="online">Online</option>
            <option value="offline">Offline</option>
          </select>
        </div>
        <button type="submit" class="btn">Save</button>
      </form>
    </div>
  </div>

  <script>
    const API_URL = `${window.location.protocol}//${window.location.hostname}:8000`;
    let currentPage = 'dashboard';
    let devices = [];
    let alerts = [];
    let currentUser = null;
    let authToken = null;
    
    const TOKEN_KEY = 'sentinel_prime_token';
    const USER_KEY = 'sentinel_prime_user';
    
    function getToken() {
      return localStorage.getItem(TOKEN_KEY);
    }
    
    function setToken(token) {
      localStorage.setItem(TOKEN_KEY, token);
      authToken = token;
    }
    
    function getUser() {
      const user = localStorage.getItem(USER_KEY);
      return user ? JSON.parse(user) : null;
    }
    
    function setUser(user) {
      localStorage.setItem(USER_KEY, JSON.stringify(user));
      currentUser = user;
    }
    
    function clearAuth() {
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(USER_KEY);
      authToken = null;
      currentUser = null;
    }
    
    function showAuth() {
      document.getElementById('auth-container').classList.add('show');
      document.getElementById('app-container').classList.remove('show');
    }
    
    function showApp() {
      document.getElementById('auth-container').classList.remove('show');
      document.getElementById('app-container').classList.add('show');
      currentUser = getUser();
      if (currentUser) {
        document.getElementById('user-display').textContent = currentUser.username;
      }
      loadData().then(render);
    }
    
    function showLogin() {
      document.getElementById('login-form').style.display = 'block';
      document.getElementById('register-form').style.display = 'none';
      document.getElementById('login-error').classList.remove('show');
    }
    
    function showRegister() {
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('register-form').style.display = 'block';
      document.getElementById('register-error').classList.remove('show');
    }
    
    function showError(elementId, message) {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.classList.add('show');
    }
    
    async function login() {
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;
      
      if (!username || !password) {
        showError('login-error', 'Please enter username and password');
        return;
      }
      
      try {
        const res = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: 'Login failed' }));
          throw new Error(err.detail || 'Login failed');
        }
        
        const data = await res.json();
        setToken(data.access_token);
        setUser(data.user);
        showApp();
      } catch (e) {
        console.error('Login error:', e);
        showError('login-error', e.message || 'Login failed');
      }
    }
    
    async function register() {
      const username = document.getElementById('reg-username').value;
      const password = document.getElementById('reg-password').value;
      const email = document.getElementById('reg-email').value;
      const fullName = document.getElementById('reg-fullname').value;
      
      if (!username || !password) {
        showError('register-error', 'Please enter username and password');
        return;
      }
      
      try {
        const res = await fetch(`${API_URL}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            username, 
            password, 
            email: email || null,
            full_name: fullName || null
          })
        });
        
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Registration failed');
        }
        
        const data = await res.json();
        setToken(data.access_token);
        setUser(data.user);
        showApp();
      } catch (e) {
        showError('register-error', e.message);
      }
    }
    
    async function logout() {
      const token = getToken();
      if (token) {
        try {
          await fetch(`${API_URL}/auth/logout`, {
            method: 'POST',
            headers: { 
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ token })
          });
        } catch (e) {}
      }
      clearAuth();
      showAuth();
    }
    
    async function api(endpoint, options = {}) {
      const token = getToken();
      const config = {
        headers: {
          'Content-Type': 'application/json',
          ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
          ...options.headers,
        },
        ...options,
      };
      
      if (config.body && typeof config.body === 'object') {
        config.body = JSON.stringify(config.body);
      }
      
      const res = await fetch(`${API_URL}${endpoint}`, config);
      
      if (res.status === 401) {
        logout();
        throw new Error('Unauthorized');
      }
      
      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: 'Request failed' }));
        throw new Error(err.detail || `HTTP error! status: ${res.status}`);
      }
      
      return res.json();
    }
    
    async function loadData() {
      try {
        const [devicesData, alertsData] = await Promise.all([
          api('/devices'),
          api('/alerts'),
        ]);
        devices = devicesData;
        alerts = alertsData;
      } catch (e) {
        console.error('API Error:', e);
      }
    }
    
    function showPage(page) {
      currentPage = page;
      document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      render();
    }
    
    function render() {
      const content = document.getElementById('main-content');
      if (currentPage === 'dashboard') renderDashboard(content);
      else if (currentPage === 'devices') renderDevices(content);
      else if (currentPage === 'alerts') renderAlerts(content);
      else if (currentPage === 'settings') renderSettings(content);
    }
    
    function renderDashboard(content) {
      const online = devices.filter(d => d.status === 'online').length;
      const unack = alerts.filter(a => !a.acknowledged).length;
      const critical = alerts.filter(a => a.severity === 'critical' && !a.acknowledged).length;
      
      content.innerHTML = `
        <div class="stats">
          <div class="stat-card">
            <div class="stat-number">${devices.length}</div>
            <div class="stat-label">Total Devices</div>
          </div>
          <div class="stat-card">
            <div class="stat-number online">${online}</div>
            <div class="stat-label">Online</div>
          </div>
          <div class="stat-card">
            <div class="stat-number alert-color">${unack}</div>
            <div class="stat-label">Pending Alerts</div>
          </div>
          <div class="stat-card">
            <div class="stat-number critical">${critical}</div>
            <div class="stat-label">Critical</div>
          </div>
        </div>
        
        <div class="section">
          <div class="section-title">Recent Alerts <button class="btn btn-small" style="float:right;" onclick="loadData().then(render)">Refresh</button></div>
          ${alerts.length === 0 ? '<div class="empty">No alerts</div>' : alerts.slice(0, 5).map(a => `
            <div class="item">
              <div class="item-info">
                <h4>${a.title}</h4>
                <p>${a.source} - ${new Date(a.timestamp).toLocaleString()}</p>
              </div>
              <span class="badge badge-${a.severity}">${a.severity}</span>
            </div>
          `).join('')}
        </div>
        
        <div class="section">
          <div class="section-title">Devices</div>
          ${devices.length === 0 ? '<div class="empty">No devices</div>' : devices.slice(0, 5).map(d => `
            <div class="item">
              <div class="item-info">
                <h4>${d.name}</h4>
                <p>${d.ip_address} - ${d.type}</p>
              </div>
              <span class="badge badge-${d.status}">${d.status}</span>
            </div>
          `).join('')}
        </div>
      `;
    }
    
    function renderDevices(content) {
      content.innerHTML = `
        <div class="section">
          <div class="section-title">
            Devices 
            <button class="btn btn-small" style="float:right;margin-left:10px;" onclick="loadData().then(render)">Refresh</button>
            <button class="btn btn-small" style="float:right;" onclick="openAddDevice()">+ Add</button>
          </div>
          ${devices.length === 0 ? '<div class="empty">No devices found</div>' : devices.map(d => `
            <div class="item">
              <div class="item-info">
                <h4>${d.name}</h4>
                <p>${d.ip_address}${d.mac_address ? ' - ' + d.mac_address : ''}</p>
                <p>${d.type}</p>
              </div>
              <div>
                <span class="badge badge-${d.status}">${d.status}</span>
                <button class="btn btn-small" style="margin-left:5px;" onclick="editDevice(${d.id})">Edit</button>
                <button class="btn btn-small btn-danger" style="margin-left:5px;" onclick="deleteDevice(${d.id})">Delete</button>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }
    
    function renderAlerts(content) {
      content.innerHTML = `
        <div class="section">
          <div class="section-title">Alerts <button class="btn btn-small" style="float:right;" onclick="loadData().then(render)">Refresh</button></div>
          <div class="filter-bar">
            <button class="filter-btn active" onclick="filterAlerts('all', this)">All</button>
            <button class="filter-btn" onclick="filterAlerts('pending', this)">Pending</button>
            <button class="filter-btn" onclick="filterAlerts('acknowledged', this)">Acknowledged</button>
          </div>
          <div id="alerts-list">
            ${alerts.length === 0 ? '<div class="empty">No alerts</div>' : alerts.map(a => `
              <div class="item">
                <div class="item-info">
                  <h4>${a.title}</h4>
                  <p>${a.source} - ${new Date(a.timestamp).toLocaleString()}</p>
                  ${a.description ? `<p>${a.description}</p>` : ''}
                </div>
                <div>
                  <span class="badge badge-${a.severity}">${a.severity}</span>
                  ${!a.acknowledged ? `<button class="btn btn-small" style="margin-left:5px;" onclick="acknowledgeAlert(${a.id})">Ack</button>` : '<span style="margin-left:10px;font-size:12px;color:#4caf50;">✓</span>'}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }
    
    function renderSettings(content) {
      content.innerHTML = `
        <div class="section">
          <div class="section-title">General</div>
          <div class="setting-item">
            <div class="setting-info">
              <h4>Notifications</h4>
              <p>Enable push notifications for alerts</p>
            </div>
            <input type="checkbox" checked>
          </div>
          <div class="setting-item">
            <div class="setting-info">
              <h4>Dark Mode</h4>
              <p>Use dark theme</p>
            </div>
            <input type="checkbox">
          </div>
        </div>
        
        <div class="section">
          <div class="section-title">Security</div>
          <div class="setting-item">
            <div class="setting-info">
              <h4>Auto Scan</h4>
              <p>Automatically scan new devices</p>
            </div>
            <input type="checkbox">
          </div>
          <div class="setting-item">
            <div class="setting-info">
              <h4>Honeypot</h4>
              <p>Enable honeypot services</p>
            </div>
            <input type="checkbox">
          </div>
          <div class="setting-item">
            <div class="setting-info">
              <h4>IPS/IDS</h4>
              <p>Enable intrusion detection</p>
            </div>
            <input type="checkbox">
          </div>
        </div>
        
        <div class="section">
          <div class="section-title">Network</div>
          <div class="setting-item">
            <div class="setting-info">
              <h4>Network Range</h4>
              <p>192.168.1.0/24</p>
            </div>
          </div>
          <div class="setting-item">
            <div class="setting-info">
              <h4>API Server</h4>
              <p>http://localhost:8000</p>
            </div>
          </div>
        </div>
        
        <div class="section">
          <div class="section-title">Account</div>
          <div class="setting-item">
            <div class="setting-info">
              <h4>Username</h4>
              <p>${currentUser?.username || 'N/A'}</p>
            </div>
          </div>
          <div class="setting-item">
            <div class="setting-info">
              <h4>Email</h4>
              <p>${currentUser?.email || 'Not set'}</p>
            </div>
          </div>
        </div>
        
        <div class="section">
          <div class="section-title">About</div>
          <div class="setting-item">
            <div class="setting-info">
              <h4>Sentinel Prime</h4>
              <p>Version 1.0.0</p>
              <p>Home Network Security Suite</p>
            </div>
          </div>
        </div>
      `;
    }
    
    function filterAlerts(type, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      
      const filtered = type === 'all' ? alerts : 
                       type === 'pending' ? alerts.filter(a => !a.acknowledged) :
                       alerts.filter(a => a.acknowledged);
      
      const list = document.getElementById('alerts-list');
      list.innerHTML = filtered.length === 0 ? '<div class="empty">No alerts</div>' : filtered.map(a => `
        <div class="item">
          <div class="item-info">
            <h4>${a.title}</h4>
            <p>${a.source} - ${new Date(a.timestamp).toLocaleString()}</p>
          </div>
          <div>
            <span class="badge badge-${a.severity}">${a.severity}</span>
            ${!a.acknowledged ? `<button class="btn btn-small" style="margin-left:5px;" onclick="acknowledgeAlert(${a.id})">Ack</button>` : '<span style="margin-left:10px;font-size:12px;color:#4caf50;">✓</span>'}
          </div>
        </div>
      `).join('');
    }
    
    function openAddDevice() {
      document.getElementById('modal-title').textContent = 'Add Device';
      document.getElementById('device-id').value = '';
      document.getElementById('device-form').reset();
      document.getElementById('device-modal').classList.add('show');
    }
    
    function editDevice(id) {
      const device = devices.find(d => d.id === id);
      if (!device) return;
      document.getElementById('modal-title').textContent = 'Edit Device';
      document.getElementById('device-id').value = device.id;
      document.getElementById('device-name').value = device.name;
      document.getElementById('device-ip').value = device.ip_address;
      document.getElementById('device-mac').value = device.mac_address || '';
      document.getElementById('device-type').value = device.type;
      document.getElementById('device-status').value = device.status;
      document.getElementById('device-modal').classList.add('show');
    }
    
    function closeModal() {
      document.getElementById('device-modal').classList.remove('show');
    }
    
    document.getElementById('device-form').onsubmit = async (e) => {
      e.preventDefault();
      const id = document.getElementById('device-id').value;
      const data = {
        name: document.getElementById('device-name').value,
        ip_address: document.getElementById('device-ip').value,
        mac_address: document.getElementById('device-mac').value,
        type: document.getElementById('device-type').value,
        status: document.getElementById('device-status').value
      };
      
      try {
        if (id) {
          await api(`/devices/${id}`, { method: 'PUT', body: data });
        } else {
          await api('/devices', { method: 'POST', body: data });
        }
        closeModal();
        await loadData();
        render();
      } catch (e) {
        alert('Error: ' + e.message);
      }
    };
    
    async function deleteDevice(id) {
      if (!confirm('Delete this device?')) return;
      try {
        await api(`/devices/${id}`, { method: 'DELETE' });
        await loadData();
        render();
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }
    
    async function acknowledgeAlert(id) {
      try {
        await api(`/alerts/${id}/acknowledge`, { method: 'PUT' });
        await loadData();
        render();
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }
    
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      const token = getToken();
      const user = getUser();
      
      if (token && user) {
        showApp();
      } else {
        showAuth();
      }
    });
    
    // Handle Enter key on login form
    document.getElementById('login-password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });
    
    document.getElementById('reg-password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') register();
    });
  </script>
</body>
</html>
