<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sentinel Prime Report{% endblock %}</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
        }
        .container {
            width: 85%;
            margin: auto;
            overflow: hidden;
            padding: 20px;
            background: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        header {
            background: #2c3e50;
            color: #ffffff;
            padding-top: 30px;
            min-height: 70px;
            border-bottom: #3498db 3px solid;
            margin-bottom: 20px;
            text-align: center;
        }
        header h1 {
            margin: 0;
            font-size: 2em;
        }
        .report-meta {
            text-align: right;
            font-size: 0.9em;
            color: #777;
            margin-bottom: 20px;
        }
        h2 {
            color: #2c3e50;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        table th, table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        table th {
            background-color: #f8f9fa;
            color: #2c3e50;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        .severity-critical { color: #e74c3c; font-weight: bold; }
        .severity-high { color: #e67e22; font-weight: bold; }
        .severity-medium { color: #f1c40f; font-weight: bold; }
        .severity-low { color: #2ecc71; font-weight: bold; }
        
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            padding: 20px;
            margin-bottom: 20px;
        }
        footer {
            text-align: center;
            padding: 20px;
            color: #777;
            font-size: 0.8em;
        }
        @media print {
            body { background: #fff; }
            .container { box-shadow: none; width: 100%; }
            header { background: #2c3e50; color: #fff !important; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Sentinel Prime</h1>
    </header>
    <div class="container">
        <div class="report-meta">
            Generated on: {{ generation_time }}
        </div>
        {% block content %}{% endblock %}
    </div>
    <footer>
        &copy; {{ year }} Sentinel Prime - Security Intelligence Report
    </footer>
</body>
</html>
