{
    "version": "1",
    "logpath": "/var/log/opencanary/",
    "node": "sentinel-prime-honeypot",
    "device": {},
    "enabled": true,
    "contactip": "",
    "honeypot": {
        "http": {
            "enabled": true,
            "port": 80,
            "status_codes": [200, 404, 403, 500],
            "root_dirs": ["admin", "cgi-bin", "images", "includes"],
            "support_basic_auth": true,
            " Bisc": false,
            "port_end": 8080
        },
        "httpproxy": {
            "enabled": false,
            "port": 3128,
            "spawn": ["python3", "-m", "opencanary.httpproxy"]
        },
        "httpserver": {
            "enabled": true,
            "port": 443
        },
        "ftp": {
            "enabled": true,
            "port": 21,
            "banner": "FTP server ready"
        },
        "ssh": {
            "enabled": true,
            "port": 22,
            "banner": "SSH-2.0-OpenSSH_8.2p1 Ubuntu-4ubuntu2"
        },
        "telnet": {
            "enabled": true,
            "port": 23,
            "banner": "Ubuntu 20.04 LTS"
        },
        "smb": {
            "enabled": true,
            "port": 445
        },
        "mysql": {
            "enabled": true,
            "port": 3306,
            "banner": "5.7.35-0ubuntu0.1"
        },
        "postgresql": {
            "enabled": true,
            "port": 5432,
            "banner": "PostgreSQL 12.8"
        },
        "vnc": {
            "enabled": false,
            "port": 5900
        },
        "git": {
            "enabled": true,
            "port": 9418
        },
        "redis": {
            "enabled": false,
            "port": 6379
        },
        "mongodb": {
            "enabled": false,
            "port": 27017
        },
        "ntp": {
            "enabled": false,
            "port": 123
        },
        "snmp": {
            "enabled": false,
            "port": 161
        },
        "rsync": {
            "enabled": false,
            "port": 873
        },
        "tftp": {
            "enabled": false,
            "port": 69
        },
        "sip": {
            "enabled": false,
            "port": 5060
        },
        "httphtmltitle": {
            "enabled": true,
            "port": 8888,
            "title": "Login Page"
        },
        "dionaea": {
            "enabled": false,
            "services": ["http", "https", "ftp", "mysql", "ssh", "telnet", "smb", "vnc"]
        },
        "cowrie": {
            "enabled": false
        },
        "claymore": {
            "enabled": false,
            "port": 3333
        },
        "medusa": {
            "enabled": false,
            "port": 2222
        }
    },
    "logger": {
        "formatters": {
            "default": {
                "()": "opencanary.logger.FormatterFactory",
                "name": "opencanary.passpole"
            }
        },
        "handlers": {
            "console": {
                "class": "logging.StreamHandler",
                "formatter": "default",
                "stream": "ext://sys.stdout"
            },
            "file": {
                "class": "logging.handlers.RotatingFileHandler",
                "formatter": "default",
                "filename": "/var/log/opencanary/honeypot.log",
                "maxBytes": 10485760,
                "backupCount": 5
            }
        },
        "root": {
            "level": "INFO",
            "handlers": ["console", "file"]
        }
    },
    "sensor": {
        "class": "opencanary.sensor.Serialised",
        "devices": []
    }
}
